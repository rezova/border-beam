        <rect width="83" height="112.467" fill="url(#r8)" opacity="0.2"/>
        <rect width="83" height="112.467" fill="url(#r7)" opacity="0.2"/>
        <rect width="83" height="112.467" fill="url(#r6)" opacity="0.7"/>
        <rect width="83" height="112.467" fill="url(#r5)" opacity="0.7"/>
        <rect width="83" height="112.467" fill="url(#r4)" opacity="0.9"/>
        <rect width="83" height="112.467" fill="url(#r3)" opacity="0.9"/>
        <rect width="83" height="112.467" fill="url(#r2)" opacity="0.5"/>
        <rect width="83" height="112.467" fill="url(#r1)" opacity="0.4"/>
        <rect width="83" height="112.467" fill="rgb(0,0,0)" fill-opacity="0.2"/>
      </g>
      <rect width="83" height="112.467" rx="12" stroke="white" stroke-opacity="0.12" stroke-width="1" fill="none"/>
      <g clip-path="url(#rc)">
        <rect x="-2" y="-2" width="87" height="116.467" rx="14" fill="none"
