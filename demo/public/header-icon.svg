        stroke="rgb(39,118,255)" stroke-opacity="0.64" stroke-width="6" filter="url(#blr)"/>
    </g>
    <rect width="46" height="46" rx="12" stroke="white" stroke-opacity="0.15" stroke-width="1" fill="none"/>
    <rect width="46" height="46" rx="12" stroke="white" stroke-opacity="0.05" stroke-width="0.5" fill="none"/>
