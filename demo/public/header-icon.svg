    </filter>
    <clipPath id="ic"><rect width="46" height="46" rx="12"/></clipPath>
    <clipPath id="rc"><rect width="83" height="112.467" rx="12"/></clipPath>
    <radialGradient id="i1" gradientUnits="userSpaceOnUse" cx="0" cy="0" r="10"
