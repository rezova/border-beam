    <g clip-path="url(#ic)">
      <rect width="46" height="46" fill="rgb(25,25,25)" fill-opacity="0.7"/>
      <rect width="46" height="46" fill="url(#i8)" opacity="0.2"/>
      <rect width="46" height="46" fill="url(#i7)" opacity="0.2"/>
      <rect width="46" height="46" fill="url(#i6)" opacity="0.7"/>
      <rect width="46" height="46" fill="url(#i5)" opacity="0.7"/>
      <rect width="46" height="46" fill="url(#i4)" opacity="0.9"/>
      <rect width="46" height="46" fill="url(#i3)" opacity="0.9"/>
      <rect width="46" height="46" fill="url(#i2)" opacity="0.5"/>
      <rect width="46" height="46" fill="url(#i1)" opacity="0.4"/>
      <rect width="46" height="46" fill="rgb(0,0,0)" fill-opacity="0.2"/>
    </g>
    <g clip-path="url(#ic)">
