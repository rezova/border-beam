      <stop stop-color="rgb(255,173,85)" offset="0"/><stop stop-color="rgb(255,173,85)" stop-opacity="0" offset="1"/>
    </radialGradient>
    <radialGradient id="i5" gradientUnits="userSpaceOnUse" cx="0" cy="0" r="10"
      gradientTransform="matrix(1.3 0.7 -2.492 4.628 3 0)">
      <stop stop-color="rgb(0,204,68)" offset="0"/>
      <stop stop-color="rgb(0,196,102)" stop-opacity="0.75" offset="0.25"/>
      <stop stop-color="rgb(0,187,136)" stop-opacity="0.5" offset="0.5"/>
      <stop stop-color="rgb(0,170,204)" stop-opacity="0" offset="1"/>
    </radialGradient>
