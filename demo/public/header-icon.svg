      <stop stop-color="rgb(204,0,167)" offset="0"/><stop stop-color="rgb(170,0,204)" stop-opacity="0" offset="1"/>
    </radialGradient>
    <radialGradient id="i4" gradientUnits="userSpaceOnUse" cx="0" cy="0" r="10"
