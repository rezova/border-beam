      <stop stop-color="rgb(0,196,102)" stop-opacity="0.75" offset="0.25"/>
      <stop stop-color="rgb(0,187,136)" stop-opacity="0.5" offset="0.5"/>
      <stop stop-color="rgb(0,170,204)" stop-opacity="0" offset="1"/>
